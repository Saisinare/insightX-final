<!DOCTYPE html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}" />
  </head>
  <body>
    <div class="container">
      <div class="form">
        <div class="login-form">
          <div class="form-head">
            <h1>Welcome To InsightX</h1>
            <p>Login To Your Account</p>
          </div>
          <form action="/login" method="POST"> {% csrf_token %}
            <div class="form-body">
              <div class="field">
                <label for="">Email</label>
                <br />
                <input
                  type="text"
                  name="loginusername"
                  id="loginUserName"
                  placeholder="yourEmail@gmail.com"
                  required
                />
              </div>
              <div class="field">
                <label for="">Password</label>
                <br />
                <input
                  type="password"
                  name="loginpass"
                  id="loginPass"
                  placeholder="Password"
                  required

                />
              </div>
              <div class="form-footer">
                <button type="submit" class="submit-btn">Login</button>
                <a href="{% url 'Signup' %}" id="logindirect">
                  Don't have account ? Create One</a
                >
              </div>
            </div>
          </form>
        </div>
      </div>
      <div class="addon">
        <img src="{% static 'img/wave.png' %}" id="wave" />

        <h1>Easily Predict Machine Faliure Rate!</h1>
        <p>Accurate Machine Failure Predictions.</p>
        <img src=" {% static 'img/addonBackground.JPG' %}" alt="" id="bg" />
      </div>
    </div>
  </body>
  <script>
    const pass = document.querySelector("#password");

    const showpassbtn = document.querySelector("#showpass");

    let passflag = false;
    let cpassflag = false;
    showpassbtn.addEventListener("click", () => {
      if (passflag == false) {
        pass.type = "text";
        passflag = true;
      } else {
        pass.type = "password";
        passflag = false;
      }
    });
  </script>
</html>
